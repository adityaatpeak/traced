apiVersion: v1
kind: Secret
metadata:
  name: {{ .Release.Name }}-collector-secret
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/name: traced-collector
    app.kubernetes.io/instance: {{ .Release.Name }}
type: Opaque
stringData:
  collector-api-key: {{ .Values.collectorApiKey | quote }}
  {{- if .Values.elasticsearch.apiKey }}
  elasticsearch-api-key: {{ .Values.elasticsearch.apiKey | quote }}
  {{- end }}
